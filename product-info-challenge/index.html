<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./src/output.css" rel="stylesheet">
</head>

<body class="min-h-screen bg-whitegrey flex justify-center items-center">
  <article
    class="flex product-container max-w-[1440px] bg-white rounded-2xl h-screen sm:h-full sm:flex-row sm:items-center">
    <div class="product-img-container">
      <img class="max-w-full w-(--w-headphones) max-h-(--h-headphones)" src="images/product-headphones.png"
        alt="Headphones">
    </div>
    <div class="product-info-container">
      <div class="product-info">
        <small>Headphones</small>
        <h1>Bevel Over</h1>
        <p>Wireless Noise Cancelling Headphones with Microphone and UHQ Audio.</p>
      </div>
      <ul>
        <li><span>Material</span><span>Plastic</span></li>
        <li><span>Included Components</span><span>Ear Cushions, Headband</span></li>
        <li><span>Dimensions</span><span>18.21 x 7.57 x 20.98 cm; 236 g</span></li>
      </ul>
      <div class="buttons">
        <div class="amount-btn">
          <button>+</button>
          <div>1</div><button>-</button>
        </div>
        <div class="buy-now-cta">
          <a href=""></a>
          <span>$399</span>
        </div>
      </div>
      <div>
        <div class="circle"></div>
        <small>360 view</small>
      </div>
    </div>
  </article>
</body>

</html>
